@if (isVisible) {
<div class="music-menu">
    <button class="music-button" [class.playing]="!isOff" [class.active]="isOpen" (click)="toggleDropdown()">
        @if (isOff) {
        <svg class="music-icon off" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="2" />
            <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="2" />
            <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        </svg>
        } @else {
        <span class="equalizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </span>
        }
    </button>

    @if (isOpen) {
    <div class="music-dropdown">
        <div class="dropdown-header">{{ 'music_menu.title' | translate }}</div>

        <div class="dropdown-item" [class.selected]="isOff" (click)="selectMusic(musicOffId)">
            <span class="item-icon">
                <svg class="menu-music-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="2" />
                    <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="2" />
                    <line x1="2" y1="2" x2="22" y2="22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                </svg>
            </span>
            <span class="item-name">{{ 'music_menu.off' | translate }}</span>
            @if (isOff) {
            <span class="check-mark">✓</span>
            }
        </div>

        <div class="dropdown-divider"></div>

        @for (music of ownedMusics; track music.id) {
        <div class="dropdown-item" [class.selected]="selectedMusicId === music.id" (click)="selectMusic(music.id)">
            <span class="item-icon">
                <svg class="menu-music-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="2" />
                    <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="2" />
                </svg>
            </span>
            <span class="item-name">{{ music.name | translate }}</span>
            @if (selectedMusicId === music.id) {
            <span class="check-mark">✓</span>
            }
        </div>
        }
    </div>
    }
</div>
}
