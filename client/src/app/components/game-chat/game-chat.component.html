<div class="chat">
    <div #messagesContainer class="messages-container">
        @for (message of messages; track message) {
        <div class="message" [class.own-message]="isMyMessage(message)">
            <div class="message-bubble">
                <div class="message-header">
                    <span class="message-author">{{ displayName(message.player.name) }}</span>
                    <span class="message-time">{{ message.time }}</span>
                </div>
                <div class="message-content">{{ message.message }}</div>
            </div>
        </div>
        }
    </div>
    <div class="input-container">
        <input
            #chatInput
            type="text"
            class="chat-input"
            [(ngModel)]="messageText"
            (keydown.enter)="sendMessage(messageText)"
            placeholder="{{ 'game_chat.write_message' | translate }}"
            maxlength="200"
            autocomplete="off"
        />
        <button class="send-button" (click)="sendMessage(messageText)" [disabled]="!messageText.trim()">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </button>
    </div>
</div>
