name: Keep server awake

# Render's free plan spins the server down after 15 minutes without traffic;
# a ping every 10 minutes keeps the demo responsive (free instance hours
# comfortably cover a full month).

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -fsS --max-time 60 --retry 3 https://poly-arena.onrender.com/api/health
